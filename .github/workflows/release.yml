name: Build & Release

# Builds the game on Windows, Linux and macOS with the Ling toolchain.
#   • every push to master → updates a rolling "latest" prerelease
#   • a tag like v1.2.3     → publishes a versioned release
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: soul-symphony-ling-windows.zip
          - os: ubuntu-latest
            asset: soul-symphony-ling-linux.tar.gz
          - os: macos-latest
            asset: soul-symphony-ling-macos.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      # The game's Cargo.toml has [patch] ling-lang = { path = "../ling" }, so the
      # Ling source must sit next to the game checkout as ../ling.
      - name: Checkout game (with LFS audio)
        uses: actions/checkout@v4
        with:
          path: soul-symphony-ling
          lfs: true

      - name: Checkout Ling toolchain → ../ling
        uses: actions/checkout@v4
        with:
          repository: taellinglin/ling
          path: ling

      - name: Linux system deps (minifb / gilrs / ALSA)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev libx11-dev libxcb1-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            soul-symphony-ling
            ling

      - name: Install lingfu (and ling)
        run: |
          cargo install --path ling/crates/ling-fu --bin lingfu --locked || cargo install --path ling/crates/ling-fu --bin lingfu
          cargo install --path ling --bin ling --locked || cargo install --path ling --bin ling

      - name: Build release (lingfu)
        working-directory: soul-symphony-ling
        run: lingfu build --release

      - name: Package
        working-directory: soul-symphony-ling
        shell: bash
        run: |
          EXE=soul-symphony-ling
          [ "$RUNNER_OS" = "Windows" ] && EXE=soul-symphony-ling.exe
          DIR=soul-symphony-ling
          mkdir -p dist/$DIR
          cp "target/release/$EXE" "dist/$DIR/"
          for d in game font music; do [ -d "target/release/$d" ] && cp -r "target/release/$d" "dist/$DIR/"; done
          cp target/release/*.cfg target/release/*.dat "dist/$DIR/" 2>/dev/null || true
          cd dist
          case "$RUNNER_OS" in
            Windows) 7z a "../${{ matrix.asset }}" "$DIR" ;;
            *)       tar czf "../${{ matrix.asset }}" "$DIR" ;;
          esac

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: soul-symphony-ling/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish versioned release (tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

      - name: Update rolling "latest" prerelease (master pushes)
        if: github.ref_type == 'branch' && github.ref_name == 'master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest (master)
          prerelease: true
          files: artifacts/*
          body: "Auto-built from the latest master commit (${{ github.sha }})."
